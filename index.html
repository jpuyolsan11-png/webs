<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Málaga Route Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="css.css" />
</head>

<body>
    <div class="controles">
        <div class="titulo-menu">Málaga Route Map</div>

        <label>¿A dónde quieres ir?</label>
        <input type="text" id="destinoInput" placeholder="Ej: Calle Larios, Málaga">

        <label>Modo de transporte:</label>
        <select id="modoTransporte">
            <option value="driving">🚗 En coche</option>
            <option value="foot">🚶 A pie</option>
        </select>

        <button onclick="irADestino()" style="margin-top: 15px;">
            Calcular Ruta
        </button>

        <div id="distanciaTotal">📍 Distancia: 0 km</div>
        <div id="tiempoTotal">⏱️ Tiempo: 0 min</div>
        <div id="gastoGasolina">⛽ Consumo: 0 L</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="script.js"></script>
</body>

</html>
